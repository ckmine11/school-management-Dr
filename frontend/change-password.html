<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password | School Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 55%, #0f766e 100%); min-height: 100vh; }
    .card-glass { background: rgba(255,255,255,0.97); backdrop-filter: blur(18px); }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="w-full max-w-md fade-in">
    <div class="text-center mb-8 text-white">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white/20 backdrop-blur text-3xl font-bold mb-4">S</div>
      <h1 class="text-3xl font-bold">Account Security</h1>
      <p class="text-blue-100 mt-1" id="pageSubtitle">Update your password to continue</p>
    </div>

    <div class="card-glass rounded-2xl shadow-2xl p-8">
      <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800" id="cardTitle">Set a New Password</h2>
        <p class="text-sm text-gray-500 mt-2" id="cardMessage">Your temporary password must be changed before you can access the dashboard.</p>
      </div>

      <div class="mb-5 p-4 rounded-xl bg-slate-50 border border-slate-200 text-sm text-slate-600">
        <p class="font-semibold text-slate-800" id="userSummary">Signed in user</p>
        <p class="mt-1">Use your current password one last time, then choose a new one with at least 8 characters.</p>
      </div>

      <form id="changePasswordForm" onsubmit="handlePasswordChange(event)">
        <div class="mb-4">
          <label class="label">Current Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="currentPassword" class="input pl-9" placeholder="Enter current password" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="label">New Password</label>
          <div class="relative">
            <i class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="newPassword" class="input pl-9" placeholder="Create a new password" minlength="8" required>
          </div>
        </div>

        <div class="mb-6">
          <label class="label">Confirm New Password</label>
          <div class="relative">
            <i class="fas fa-check absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" id="confirmPassword" class="input pl-9" placeholder="Re-enter new password" minlength="8" required>
          </div>
        </div>

        <div class="flex flex-col gap-3">
          <button type="submit" id="saveBtn" class="btn btn-primary w-full justify-center py-3 text-base">
            <i class="fas fa-shield-alt"></i> Update Password
          </button>
          <a id="backBtn" href="#" class="btn btn-secondary w-full justify-center py-3 text-base hidden">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
          </a>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js?v=10"></script>
  <script src="js/auth.js?v=10"></script>
  <script>
    const user = Auth.requireAuth(['admin', 'teacher', 'student', 'parent']);
    const mustChangePassword = Boolean(user?.mustChangePassword);

    if (user) {
      document.getElementById('userSummary').textContent = `${user.name} (${user.role})`;

      if (!mustChangePassword) {
        document.getElementById('pageSubtitle').textContent = 'Keep your account secure';
        document.getElementById('cardTitle').textContent = 'Change Password';
        document.getElementById('cardMessage').textContent = 'You can update your password anytime from here.';
        const backBtn = document.getElementById('backBtn');
        backBtn.href = Auth.getDashboardPath(user.role);
        backBtn.classList.remove('hidden');
      }
    }

    async function handlePasswordChange(event) {
      event.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 8) {
        showToast('New password must be at least 8 characters long', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showToast('New password and confirmation do not match', 'error');
        return;
      }

      const saveBtn = document.getElementById('saveBtn');
      saveBtn.disabled = true;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

      try {
        const res = await api.put('/auth/change-password', { currentPassword, newPassword });
        Auth.setSession(null, res.user);
        showToast('Password updated successfully', 'success');
        setTimeout(() => Auth.redirectAfterLogin(res.user), 150);
      } catch (err) {
        showToast(err.message, 'error');
        saveBtn.disabled = false;
        saveBtn.innerHTML = '<i class="fas fa-shield-alt"></i> Update Password';
      }
    }

    window.__pageInlineScriptExecuted = true;
  </script>
  <script src="js/inline-fallback.js?v=1"></script>
</body>
</html>
