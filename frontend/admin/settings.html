<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Settings | School Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">

      <div class="max-w-3xl mx-auto space-y-6">

        <!-- School Branding -->
        <div class="card">
          <div class="flex items-center gap-2 mb-5">
            <i class="fas fa-school text-blue-600"></i>
            <h2 class="text-lg font-bold text-gray-800">School Branding</h2>
          </div>

          <!-- Logo upload -->
          <div class="flex items-center gap-5 mb-5">
            <div id="logoPreview" class="w-20 h-20 rounded-xl bg-gray-100 flex items-center justify-center text-3xl font-bold text-gray-400 overflow-hidden border-2 border-dashed border-gray-300">
              S
            </div>
            <div>
              <p class="text-sm font-semibold text-gray-700 mb-1">School Logo</p>
              <p class="text-xs text-gray-400 mb-2">PNG or JPG, max 2MB. Shown in sidebar and login page.</p>
              <div class="flex gap-2">
                <label class="btn btn-secondary text-xs cursor-pointer">
                  <i class="fas fa-upload mr-1"></i> Upload Logo
                  <input type="file" id="logoInput" accept="image/*" class="hidden" onchange="uploadLogo(this)">
                </label>
                <button onclick="removeLogo()" class="btn btn-danger text-xs" id="removeLogoBtn" style="display:none">
                  <i class="fas fa-trash mr-1"></i> Remove
                </button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="label">School Name *</label>
              <input type="text" id="schoolName" class="input" placeholder="e.g. Bright Future Academy" maxlength="100">
            </div>
            <div>
              <label class="label">Tagline</label>
              <input type="text" id="tagline" class="input" placeholder="e.g. Excellence in Education" maxlength="100">
            </div>
            <div>
              <label class="label">Primary Color</label>
              <div class="flex gap-2 items-center">
                <input type="color" id="primaryColor" class="h-10 w-16 rounded border cursor-pointer" value="#1e3a5f">
                <input type="text" id="primaryColorHex" class="input flex-1" placeholder="#1e3a5f" maxlength="7">
              </div>
              <p class="text-xs text-gray-400 mt-1">Used for admin sidebar color</p>
            </div>
            <div>
              <label class="label">Academic Year</label>
              <input type="text" id="academicYear" class="input" placeholder="e.g. 2024-25" maxlength="20">
            </div>
          </div>
        </div>

        <!-- Contact Info -->
        <div class="card">
          <div class="flex items-center gap-2 mb-5">
            <i class="fas fa-address-book text-green-600"></i>
            <h2 class="text-lg font-bold text-gray-800">Contact Information</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
              <label class="label">Address</label>
              <textarea id="address" class="input h-20 resize-none" placeholder="School full address"></textarea>
            </div>
            <div>
              <label class="label">Phone Number</label>
              <input type="text" id="phone" class="input" placeholder="+91 98765 43210" maxlength="30">
            </div>
            <div>
              <label class="label">Email</label>
              <input type="email" id="email" class="input" placeholder="admin@school.com" maxlength="100">
            </div>
            <div class="md:col-span-2">
              <label class="label">Website</label>
              <input type="url" id="website" class="input" placeholder="https://www.myschool.com" maxlength="200">
            </div>
          </div>
        </div>

        <!-- Currency -->
        <div class="card">
          <div class="flex items-center gap-2 mb-5">
            <i class="fas fa-coins text-yellow-600"></i>
            <h2 class="text-lg font-bold text-gray-800">Currency</h2>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="label">Currency Code</label>
              <input type="text" id="currency" class="input" placeholder="INR" maxlength="10">
            </div>
            <div>
              <label class="label">Currency Symbol</label>
              <input type="text" id="currencySymbol" class="input" placeholder="₹" maxlength="5">
            </div>
          </div>
        </div>

        <!-- Fee Types -->
        <div class="card">
          <div class="flex items-center gap-2 mb-5">
            <i class="fas fa-tags text-purple-600"></i>
            <h2 class="text-lg font-bold text-gray-800">Fee Types</h2>
            <span class="text-xs text-gray-400">(shown in fee management dropdown)</span>
          </div>
          <div id="feeTypesList" class="space-y-2 mb-3"></div>
          <div class="flex gap-2">
            <input type="text" id="newFeeType" class="input flex-1" placeholder="Add fee type e.g. Hostel Fee" maxlength="50">
            <button onclick="addFeeType()" class="btn btn-primary">
              <i class="fas fa-plus"></i> Add
            </button>
          </div>
          <p class="text-xs text-gray-400 mt-2">These fee types will appear in the dropdown when creating fee records.</p>
        </div>

        <!-- Save -->
        <div class="flex justify-end gap-3 pb-6">
          <button onclick="loadSettings()" class="btn btn-secondary">
            <i class="fas fa-undo"></i> Reset
          </button>
          <button onclick="saveSettings()" class="btn btn-primary" id="saveBtn">
            <i class="fas fa-save"></i> Save Settings
          </button>
        </div>

      </div>
    </main>
  </div>
</div>

<script src="../js/api.js?v=10"></script>
<script src="../js/auth.js?v=10"></script>
<script src="../js/layout.js?v=10"></script>
<script>
  Auth.requireAuth(['admin']);
  buildLayout('School Settings', 'admin');

  let feeTypes = [];

  async function loadSettings() {
    try {
      const data = await api.get('/settings');
      const s = data.data;

      document.getElementById('schoolName').value = s.schoolName || '';
      document.getElementById('tagline').value = s.tagline || '';
      document.getElementById('primaryColor').value = s.primaryColor || '#1e3a5f';
      document.getElementById('primaryColorHex').value = s.primaryColor || '#1e3a5f';
      document.getElementById('academicYear').value = s.academicYear || '';
      document.getElementById('address').value = s.address || '';
      document.getElementById('phone').value = s.phone || '';
      document.getElementById('email').value = s.email || '';
      document.getElementById('website').value = s.website || '';
      document.getElementById('currency').value = s.currency || 'INR';
      document.getElementById('currencySymbol').value = s.currencySymbol || '₹';

      feeTypes = s.feeTypes || [];
      renderFeeTypes();

      if (s.logo) {
        document.getElementById('logoPreview').innerHTML = `<img src="${s.logo}" class="w-full h-full object-cover">`;
        document.getElementById('removeLogoBtn').style.display = '';
      }
    } catch (err) {
      showToast('Failed to load settings', 'error');
    }
  }

  function renderFeeTypes() {
    const list = document.getElementById('feeTypesList');
    list.innerHTML = feeTypes.map((ft, i) => `
      <div class="flex items-center gap-2 bg-gray-50 rounded-lg px-3 py-2">
        <span class="flex-1 text-sm text-gray-700">${ft}</span>
        <button onclick="removeFeeType(${i})" class="text-red-400 hover:text-red-600 text-sm"><i class="fas fa-times"></i></button>
      </div>
    `).join('') || '<p class="text-sm text-gray-400">No fee types. Add some below.</p>';
  }

  function addFeeType() {
    const input = document.getElementById('newFeeType');
    const val = input.value.trim();
    if (!val) return;
    if (feeTypes.includes(val)) { showToast('Already exists', 'error'); return; }
    feeTypes.push(val);
    renderFeeTypes();
    input.value = '';
  }

  function removeFeeType(i) {
    feeTypes.splice(i, 1);
    renderFeeTypes();
  }

  // Sync color picker and text input
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('primaryColor').addEventListener('input', e => {
      document.getElementById('primaryColorHex').value = e.target.value;
    });
    document.getElementById('primaryColorHex').addEventListener('input', e => {
      const val = e.target.value;
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        document.getElementById('primaryColor').value = val;
      }
    });
    document.getElementById('newFeeType').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addFeeType(); }
    });
  });

  async function saveSettings() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    try {
      const payload = {
        schoolName: document.getElementById('schoolName').value.trim(),
        tagline: document.getElementById('tagline').value.trim(),
        primaryColor: document.getElementById('primaryColor').value,
        academicYear: document.getElementById('academicYear').value.trim(),
        address: document.getElementById('address').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        website: document.getElementById('website').value.trim(),
        currency: document.getElementById('currency').value.trim(),
        currencySymbol: document.getElementById('currencySymbol').value.trim(),
        feeTypes
      };
      if (!payload.schoolName) { showToast('School name is required', 'error'); return; }
      await api.put('/settings', payload);
      showToast('Settings saved successfully!', 'success');
      // Reload to reflect new branding
      setTimeout(() => window.location.reload(), 800);
    } catch (err) {
      showToast(err.message || 'Failed to save', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-save"></i> Save Settings';
    }
  }

  async function uploadLogo(input) {
    if (!input.files[0]) return;
    const fd = new FormData();
    fd.append('logo', input.files[0]);
    try {
      showToast('Uploading...', 'success');
      const data = await api.post('/settings/logo', fd, true);
      const logo = data.data.logo;
      document.getElementById('logoPreview').innerHTML = `<img src="${logo}" class="w-full h-full object-cover">`;
      document.getElementById('removeLogoBtn').style.display = '';
      showToast('Logo uploaded!', 'success');
    } catch (err) {
      showToast(err.message || 'Upload failed', 'error');
    }
  }

  async function removeLogo() {
    if (!confirm('Remove school logo?')) return;
    try {
      await api.delete('/settings/logo');
      const name = document.getElementById('schoolName').value || 'S';
      document.getElementById('logoPreview').innerHTML = `<span class="text-3xl font-bold text-gray-400">${name[0].toUpperCase()}</span>`;
      document.getElementById('removeLogoBtn').style.display = 'none';
      showToast('Logo removed', 'success');
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  loadSettings();
</script>
</body>
</html>
