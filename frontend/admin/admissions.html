<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admissions | School Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-4 mb-5">
        <div class="card text-center"><div class="text-2xl font-bold text-blue-600" id="stat-new">-</div><div class="text-xs text-gray-400 mt-1">New</div></div>
        <div class="card text-center"><div class="text-2xl font-bold text-yellow-500" id="stat-contacted">-</div><div class="text-xs text-gray-400 mt-1">Contacted</div></div>
        <div class="card text-center"><div class="text-2xl font-bold text-green-600" id="stat-admitted">-</div><div class="text-xs text-gray-400 mt-1">Admitted</div></div>
        <div class="card text-center"><div class="text-2xl font-bold text-red-500" id="stat-rejected">-</div><div class="text-xs text-gray-400 mt-1">Rejected</div></div>
      </div>

      <!-- Filter -->
      <div class="flex gap-2 mb-4 flex-wrap">
        <button onclick="setFilter('')" id="f-all" class="btn btn-primary text-xs">All</button>
        <button onclick="setFilter('new')" id="f-new" class="btn btn-secondary text-xs"><i class="fas fa-circle text-blue-500 mr-1"></i>New</button>
        <button onclick="setFilter('contacted')" id="f-contacted" class="btn btn-secondary text-xs">Contacted</button>
        <button onclick="setFilter('admitted')" id="f-admitted" class="btn btn-secondary text-xs">Admitted</button>
        <button onclick="setFilter('rejected')" id="f-rejected" class="btn btn-secondary text-xs">Rejected</button>
      </div>

      <!-- Enquiry list -->
      <div id="enqList" class="space-y-3">
        <div class="text-center py-10 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl"></i></div>
      </div>
    </main>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/50 modal-backdrop z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between px-6 py-4 border-b sticky top-0 bg-white">
      <h2 class="font-bold text-lg text-gray-800">Admission Enquiry</h2>
      <button onclick="hideModal('detailModal')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100"><i class="fas fa-times"></i></button>
    </div>
    <div id="detailContent" class="p-6"></div>
  </div>
</div>

<script src="../js/api.js?v=11"></script>
<script src="../js/auth.js?v=11"></script>
<script src="../js/layout.js?v=11"></script>
<script>
  Auth.requireAuth(['admin']);
  buildLayout('Admission Enquiries', 'admin');

  let enquiries = [];
  let currentFilter = '';

  const statusColors = {
    new: 'bg-blue-100 text-blue-700',
    contacted: 'bg-yellow-100 text-yellow-700',
    admitted: 'bg-green-100 text-green-700',
    rejected: 'bg-red-100 text-red-700'
  };
  const statusIcons = { new: 'fa-circle', contacted: 'fa-phone', admitted: 'fa-check-circle', rejected: 'fa-times-circle' };

  async function loadEnquiries() {
    try {
      const params = { limit: 100 };
      if (currentFilter) params.status = currentFilter;
      const res = await api.get('/admissions', params);
      enquiries = res.data || [];
      renderList();
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function loadStats() {
    try {
      const [n, c, a, r] = await Promise.all([
        api.get('/admissions', { status: 'new', limit: 1 }),
        api.get('/admissions', { status: 'contacted', limit: 1 }),
        api.get('/admissions', { status: 'admitted', limit: 1 }),
        api.get('/admissions', { status: 'rejected', limit: 1 })
      ]);
      document.getElementById('stat-new').textContent = n.total ?? 0;
      document.getElementById('stat-contacted').textContent = c.total ?? 0;
      document.getElementById('stat-admitted').textContent = a.total ?? 0;
      document.getElementById('stat-rejected').textContent = r.total ?? 0;
    } catch {}
  }

  function renderList() {
    const list = document.getElementById('enqList');
    if (!enquiries.length) {
      list.innerHTML = '<div class="text-center py-12 text-gray-400"><i class="fas fa-user-graduate text-4xl mb-3 block"></i>No enquiries found</div>';
      return;
    }
    list.innerHTML = enquiries.map(e => `
      <div class="card cursor-pointer hover:shadow-md transition" onclick="openDetail('${e._id}')">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center font-bold text-green-600 flex-shrink-0">${e.studentName[0].toUpperCase()}</div>
            <div class="min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-semibold text-gray-800 text-sm">${e.studentName}</span>
                <span class="badge text-xs bg-purple-100 text-purple-700">${e.applyingClass}</span>
                <span class="badge text-xs ${statusColors[e.status]}"><i class="fas ${statusIcons[e.status]} mr-1"></i>${e.status}</span>
              </div>
              <div class="text-xs text-gray-500 mt-0.5">Parent: ${e.parentName} &middot; <a href="tel:${e.phone}" class="text-blue-600" onclick="event.stopPropagation()">${e.phone}</a></div>
              ${e.email ? `<div class="text-xs text-gray-400">${e.email}</div>` : ''}
            </div>
          </div>
          <div class="text-xs text-gray-400 flex-shrink-0">${formatDate(e.createdAt)}</div>
        </div>
      </div>
    `).join('');
  }

  function openDetail(id) {
    const e = enquiries.find(x => x._id === id);
    if (!e) return;

    document.getElementById('detailContent').innerHTML = `
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div><span class="text-gray-400 block text-xs">Student Name</span><span class="font-semibold">${e.studentName}</span></div>
          <div><span class="text-gray-400 block text-xs">Date of Birth</span><span>${e.dob || '-'}</span></div>
          <div><span class="text-gray-400 block text-xs">Applying for Class</span><span class="font-semibold text-purple-700">${e.applyingClass}</span></div>
          <div><span class="text-gray-400 block text-xs">Status</span>
            <select id="statusSel" onchange="updateStatus('${e._id}', this.value)" class="select text-xs py-1 px-2 h-auto">
              <option value="new" ${e.status==='new'?'selected':''}>New</option>
              <option value="contacted" ${e.status==='contacted'?'selected':''}>Contacted</option>
              <option value="admitted" ${e.status==='admitted'?'selected':''}>Admitted</option>
              <option value="rejected" ${e.status==='rejected'?'selected':''}>Rejected</option>
            </select>
          </div>
          <div><span class="text-gray-400 block text-xs">Parent / Guardian</span><span class="font-semibold">${e.parentName}</span></div>
          <div><span class="text-gray-400 block text-xs">Phone</span><a href="tel:${e.phone}" class="text-blue-600 hover:underline">${e.phone}</a></div>
          ${e.email ? `<div class="col-span-2"><span class="text-gray-400 block text-xs">Email</span><a href="mailto:${e.email}" class="text-blue-600 hover:underline">${e.email}</a></div>` : ''}
          ${e.currentSchool ? `<div class="col-span-2"><span class="text-gray-400 block text-xs">Current School</span><span>${e.currentSchool}</span></div>` : ''}
          <div class="col-span-2"><span class="text-gray-400 block text-xs">Received</span><span>${formatDateTime(e.createdAt)}</span></div>
        </div>

        ${e.message ? `
        <div>
          <span class="text-gray-400 block text-xs mb-1">Message / Queries</span>
          <div class="bg-gray-50 rounded-xl p-4 text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">${e.message}</div>
        </div>` : ''}

        <div>
          <span class="text-gray-400 block text-xs mb-1">Admin Note (internal)</span>
          <textarea id="adminNote" class="input h-20 resize-none text-sm" placeholder="Add private note...">${e.adminNote || ''}</textarea>
        </div>

        <div class="flex gap-2 flex-wrap">
          <a href="tel:${e.phone}" class="btn btn-success text-xs flex-1 justify-center">
            <i class="fas fa-phone mr-1"></i> Call Parent
          </a>
          ${e.email ? `<a href="mailto:${e.email}?subject=Admission Enquiry - ${encodeURIComponent(e.studentName)}" class="btn btn-primary text-xs flex-1 justify-center">
            <i class="fas fa-envelope mr-1"></i> Send Email
          </a>` : ''}
          <button onclick="saveNote('${e._id}')" class="btn btn-secondary text-xs">
            <i class="fas fa-save mr-1"></i> Save Note
          </button>
          <button onclick="deleteEnq('${e._id}')" class="btn btn-danger text-xs">
            <i class="fas fa-trash mr-1"></i>
          </button>
        </div>
      </div>
    `;
    showModal('detailModal');
  }

  async function updateStatus(id, status) {
    try {
      await api.put(`/admissions/${id}`, { status });
      const e = enquiries.find(x => x._id === id);
      if (e) e.status = status;
      renderList();
      loadStats();
      showToast('Status updated', 'success');
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function saveNote(id) {
    const note = document.getElementById('adminNote')?.value || '';
    await api.put(`/admissions/${id}`, { adminNote: note });
    const e = enquiries.find(x => x._id === id);
    if (e) e.adminNote = note;
    showToast('Note saved', 'success');
  }

  async function deleteEnq(id) {
    if (!confirm('Delete this enquiry?')) return;
    await api.delete(`/admissions/${id}`);
    enquiries = enquiries.filter(x => x._id !== id);
    renderList();
    hideModal('detailModal');
    showToast('Deleted', 'success');
    loadStats();
  }

  function setFilter(f) {
    currentFilter = f;
    ['all','new','contacted','admitted','rejected'].forEach(k => {
      const btn = document.getElementById(`f-${k}`);
      if (btn) btn.className = (f === k || (k === 'all' && f === '')) ? 'btn btn-primary text-xs' : 'btn btn-secondary text-xs';
    });
    loadEnquiries();
  }

  loadEnquiries();
  loadStats();
</script>
</body>
</html>
