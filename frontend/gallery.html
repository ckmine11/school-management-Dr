<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Bright Future School</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50">
  <nav class="sticky top-0 bg-white shadow-sm z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold">S</div><span class="font-bold text-gray-800">Bright Future School</span></a>
      <div class="hidden md:flex gap-6 text-sm font-medium text-gray-600">
        <a href="index.html" class="hover:text-blue-600">Home</a><a href="about.html" class="hover:text-blue-600">About</a>
        <a href="admission.html" class="hover:text-blue-600">Admission</a><a href="gallery.html" class="text-blue-600">Gallery</a>
        <a href="contact.html" class="hover:text-blue-600">Contact</a>
      </div>
      <a href="login.html" class="btn btn-primary text-sm">Login</a>
    </div>
  </nav>

  <div class="bg-gradient-to-r from-purple-700 to-purple-500 text-white py-16 px-4 text-center">
    <h1 class="text-4xl font-bold mb-3">Our Gallery</h1>
    <p class="text-purple-100">Moments that make us proud</p>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-12">
    <!-- Filter -->
    <div class="flex flex-wrap gap-3 justify-center mb-8">
      <button onclick="filter('all')" class="btn btn-primary filter-btn" data-cat="all">All</button>
      <button onclick="filter('sports')" class="btn btn-secondary filter-btn" data-cat="sports">Sports</button>
      <button onclick="filter('academics')" class="btn btn-secondary filter-btn" data-cat="academics">Academics</button>
      <button onclick="filter('events')" class="btn btn-secondary filter-btn" data-cat="events">Events</button>
      <button onclick="filter('campus')" class="btn btn-secondary filter-btn" data-cat="campus">Campus</button>
    </div>

    <!-- Gallery Grid (placeholder colored blocks since no real images) -->
    <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
    </div>
  </div>

  <footer class="bg-gray-900 text-gray-400 py-8 px-4 text-center text-sm mt-8">
    © 2024 Bright Future School. <a href="index.html" class="text-blue-400 hover:text-blue-300">Back to Home</a>
  </footer>

  <script>
    const API_BASE = '/api';
    const FALLBACK_ITEMS = [
      { cat: 'sports', title: 'Annual Sports Day', color: 'from-orange-400 to-red-500', icon: 'fa-trophy' },
      { cat: 'sports', title: 'Cricket Championship', color: 'from-green-400 to-teal-500', icon: 'fa-baseball-ball' },
      { cat: 'academics', title: 'Science Exhibition', color: 'from-blue-400 to-indigo-500', icon: 'fa-flask' },
      { cat: 'academics', title: 'Math Olympiad', color: 'from-purple-400 to-pink-500', icon: 'fa-calculator' },
      { cat: 'events', title: 'Annual Day 2024', color: 'from-pink-400 to-rose-500', icon: 'fa-star' },
      { cat: 'events', title: 'Independence Day', color: 'from-orange-400 to-yellow-500', icon: 'fa-flag' },
      { cat: 'campus', title: 'School Building', color: 'from-slate-400 to-gray-500', icon: 'fa-school' },
      { cat: 'campus', title: 'Computer Lab', color: 'from-cyan-400 to-blue-500', icon: 'fa-laptop' },
    ];

    let allItems = [];
    let currentFilter = 'all';

    async function loadGallery() {
      try {
        const res = await fetch(`${API_BASE}/gallery`);
        const data = await res.json();
        if (data.success && data.data.length > 0) {
          allItems = data.data.map(item => ({ ...item, cat: item.category, fromApi: true }));
        } else {
          allItems = FALLBACK_ITEMS;
        }
      } catch {
        allItems = FALLBACK_ITEMS;
      }
      render();
    }

    function filter(cat) {
      currentFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.className = b.dataset.cat === cat ? 'btn btn-primary filter-btn' : 'btn btn-secondary filter-btn';
      });
      render();
    }

    function render() {
      const filtered = currentFilter === 'all' ? allItems : allItems.filter(i => i.cat === currentFilter);
      if (!filtered.length) {
        document.getElementById('gallery').innerHTML = '<div class="col-span-full text-center py-12 text-gray-400">No images in this category</div>';
        return;
      }
      document.getElementById('gallery').innerHTML = filtered.map(item => {
        if (item.fromApi) {
          return `
            <div class="group relative rounded-2xl overflow-hidden cursor-pointer shadow-sm hover:shadow-lg transition-all bg-white">
              <div class="aspect-square overflow-hidden bg-gray-100">
                <img src="/uploads/gallery/${item.image}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
              </div>
              <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/70 to-transparent p-3 opacity-0 group-hover:opacity-100 transition-all">
                <p class="text-white text-sm font-semibold">${item.title}</p>
              </div>
            </div>`;
        }
        return `
          <div class="group relative rounded-2xl overflow-hidden cursor-pointer shadow-sm hover:shadow-lg transition-all">
            <div class="bg-gradient-to-br ${item.color} aspect-square flex flex-col items-center justify-center p-4 text-white">
              <i class="fas ${item.icon} text-4xl mb-3 opacity-80"></i>
              <p class="text-sm font-semibold text-center">${item.title}</p>
            </div>
            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-all flex items-center justify-center">
              <i class="fas fa-expand text-white opacity-0 group-hover:opacity-100 transition-all text-2xl"></i>
            </div>
          </div>`;
      }).join('');
    }

    loadGallery();
  </script>
  <script src="js/auth.js?v=10"></script>
</body>
</html>
