<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Exam Schedule | School Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">

      <div id="examContent">
        <div class="text-center py-10 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl"></i></div>
      </div>

    </main>
  </div>
</div>

<script src="../js/api.js?v=10"></script>
<script src="../js/auth.js?v=10"></script>
<script src="../js/layout.js?v=10"></script>
<script>
  Auth.requireAuth(['student']);
  buildLayout('My Exam Schedule', 'student');

  const TYPE_LABELS = { 'unit-test': 'Unit Test', midterm: 'Midterm', quarterly: 'Quarterly', final: 'Final', other: 'Other' };

  async function init() {
    try {
      const res = await api.get('/exams');
      const exams = res.data;
      renderExams(exams);
    } catch (err) {
      document.getElementById('examContent').innerHTML =
        `<div class="bg-red-50 border border-red-200 rounded-2xl p-6 text-center text-red-600">${err.message}</div>`;
    }
  }

  function renderExams(data) {
    const content = document.getElementById('examContent');
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const upcoming = data.filter(e => new Date(e.examDate) >= today);
    const past = data.filter(e => new Date(e.examDate) < today);

    if (!data.length) {
      content.innerHTML = '<div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center text-gray-400"><i class="fas fa-calendar-times text-4xl mb-3 block"></i>No exams scheduled yet.</div>';
      return;
    }

    const examCard = (e) => {
      const examDate = new Date(e.examDate);
      const isPast = examDate < today;
      const diffDays = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));
      const badge = diffDays === 0 ? '<span class="badge badge-green ml-2">Today!</span>'
        : diffDays === 1 ? '<span class="badge badge-yellow ml-2">Tomorrow</span>'
        : diffDays > 0 && diffDays <= 3 ? `<span class="badge badge-yellow ml-2">In ${diffDays} days</span>` : '';

      return `
        <div class="bg-white rounded-2xl shadow-sm border ${!isPast && diffDays <= 1 ? 'border-yellow-300' : 'border-gray-100'} p-5 flex items-center gap-4">
          <div class="w-14 h-14 rounded-xl ${isPast ? 'bg-gray-100' : 'bg-indigo-50'} flex flex-col items-center justify-center flex-shrink-0">
            <span class="text-lg font-bold ${isPast ? 'text-gray-400' : 'text-indigo-700'}">${examDate.getDate()}</span>
            <span class="text-xs ${isPast ? 'text-gray-400' : 'text-indigo-500'}">${examDate.toLocaleDateString('en-IN', { month: 'short' })}</span>
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center flex-wrap gap-1">
              <span class="font-bold text-gray-800">${e.subject}</span>
              ${badge}
              ${isPast ? '<span class="badge badge-gray ml-1 text-xs">Done</span>' : ''}
            </div>
            <div class="text-sm text-gray-500 mt-1">
              ${TYPE_LABELS[e.examType] || e.examType} &bull; ${e.startTime} &bull; ${e.duration} min &bull; ${e.maxMarks} marks
              ${e.room ? ` &bull; Room: ${e.room}` : ''}
            </div>
          </div>
        </div>`;
    };

    content.innerHTML = '';

    if (upcoming.length) {
      content.innerHTML += `<h3 class="font-semibold text-gray-700 mb-3">Upcoming Exams (${upcoming.length})</h3>
        <div class="space-y-3 mb-6">${upcoming.map(examCard).join('')}</div>`;
    }
    if (past.length) {
      content.innerHTML += `<h3 class="font-semibold text-gray-500 mb-3">Past Exams</h3>
        <div class="space-y-3">${past.map(examCard).join('')}</div>`;
    }
  }

  init();
  window.__pageInlineScriptExecuted = true;
</script>
<script src="../js/inline-fallback.js?v=1"></script>
</body>
</html>
