<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-gray-50">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6">

      <div class="bg-gradient-to-r from-indigo-600 to-purple-500 rounded-2xl p-6 mb-6 text-white">
        <h2 class="text-2xl font-bold mb-1" id="welcomeMsg">Welcome!</h2>
        <p class="text-indigo-100 text-sm" id="classInfo"></p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <a href="attendance.html" class="card bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:border-indigo-300 transition">
          <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center mb-3">
            <i class="fas fa-calendar-check text-green-600 text-xl"></i>
          </div>
          <h3 class="font-bold text-gray-800">My Attendance</h3>
          <p class="text-sm text-gray-500 mt-1">View your attendance record</p>
        </a>
        <a href="fees.html" class="card bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:border-yellow-300 transition">
          <div class="w-12 h-12 rounded-xl bg-yellow-50 flex items-center justify-center mb-3">
            <i class="fas fa-indian-rupee-sign text-yellow-600 text-xl"></i>
          </div>
          <h3 class="font-bold text-gray-800">My Fees</h3>
          <p class="text-sm text-gray-500 mt-1">Check payment status</p>
        </a>
        <a href="results.html" class="card bg-white rounded-2xl p-5 shadow-sm border border-gray-100 hover:border-blue-300 transition">
          <div class="w-12 h-12 rounded-xl bg-blue-50 flex items-center justify-center mb-3">
            <i class="fas fa-chart-bar text-blue-600 text-xl"></i>
          </div>
          <h3 class="font-bold text-gray-800">My Results</h3>
          <p class="text-sm text-gray-500 mt-1">View exam results and grades</p>
        </a>
      </div>

      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
        <h2 class="font-bold text-gray-800 mb-4">Latest Notices</h2>
        <div id="noticesList">
          <div class="text-center text-gray-400 py-6"><i class="fas fa-spinner fa-spin text-2xl"></i></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js?v=11"></script>
<script src="../js/auth.js?v=11"></script>
<script src="../js/layout.js?v=11"></script>
<script>
  const user = Auth.requireAuth(['student']);
  buildLayout('My Dashboard', 'student');
  document.getElementById('welcomeMsg').textContent = `Hello, ${user?.name || 'Student'}!`;
  document.getElementById('classInfo').textContent = user?.class
    ? `${user.class} - ${user.section || '-'}${user.rollNo ? ` | Roll ${user.rollNo}` : ''}`
    : 'Access your attendance, fee status, and results.';

  api.get('/notices', { audience: 'students' }).then(res => {
    const el = document.getElementById('noticesList');
    const typeColors = { general:'badge-blue', exam:'badge-yellow', holiday:'badge-green', fee:'badge-red' };
    if (!res.data.length) { el.innerHTML = '<p class="text-center text-gray-400 text-sm">No notices</p>'; return; }
    el.innerHTML = res.data.slice(0,5).map(n => `
      <div class="p-3 bg-gray-50 rounded-xl mb-2">
        <div class="flex items-center gap-2 mb-1"><span class="font-semibold text-sm">${n.title}</span><span class="badge ${typeColors[n.type]||'badge-gray'}">${n.type}</span></div>
        <p class="text-xs text-gray-600">${n.content}</p>
        <span class="text-xs text-gray-400">${formatDate(n.createdAt)}</span>
      </div>`).join('');
  }).catch(() => {});
  window.__pageInlineScriptExecuted = true;
</script>
<script src="../js/inline-fallback.js?v=1"></script>
</body>
</html>
