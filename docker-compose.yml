services:
  mongodb:
    image: mongo:7-jammy
    container_name: school-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: schoolmanagement
    volumes:
      - mongodb_data:/data/db
    networks:
      - school-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/schoolmanagement
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      ADMIN_RECOVERY_SECRET: ${ADMIN_RECOVERY_SECRET}
      SCHOOL_NAME: ${SCHOOL_NAME:-Bright Future School}
      SCHOOL_EMAIL: ${SCHOOL_EMAIL:-admin@brightfutureschool.com}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      ONESIGNAL_APP_ID: ${ONESIGNAL_APP_ID:-}
      ONESIGNAL_REST_API_KEY: ${ONESIGNAL_REST_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - uploads_data:/app/uploads
      - whatsapp_session:/app/.wwebjs_auth
    shm_size: '256mb'
    networks:
      - school-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - school-net

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
  whatsapp_session:
    driver: local

networks:
  school-net:
    driver: bridge
